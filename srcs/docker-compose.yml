services:
  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "443:443"
    networks:
      - inception
    restart: always
    volumes:
      - wordpress_data:/var/www/html/wordpress
    depends_on:
      - wordpress

  mariadb:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    container_name: mariadb
    networks:
      - inception
    env_file:
      - .env
    restart: always
    volumes:
      - mariadb_data:/var/lib/mysql

  redis:
    build:
      context: ./requierments/bonus/redis
      dockerfile: Dockerfile
    container_name: redis
    networks:
    - inception
    restart: always

  wordpress:
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    container_name: wordpress
    networks:
      - inception
    env_file:
      - .env
    depends_on:
      - mariadb
      - redis
    restart: always
    volumes:
      - wordpress_data:/var/www/html/wordpress

networks:
  inception:
    driver: bridge

volumes:
  wordpress_data:
  mariadb_data:
  
